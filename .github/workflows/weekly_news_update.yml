name: Weekly News Update

on:
  schedule:
    # Se ejecuta todos los lunes a las 07:00 UTC (09:00 AM en España)
    - cron: '0 7 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest
    # Añadimos permisos de escritura
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run update script
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'News Bot'
          git config --global user.email 'bot@eiscoa.com'
          git add index.html
          # Solo hacemos push si hay cambios reales
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated weekly news update" && git push)
