name: Weekly News Update

on:
  schedule:
    # Se ejecuta todos los lunes a las 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run update script
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'News Bot'
          git config --global user.email 'bot@eiscoa.com'
          git add index.html
          git commit -m "Automated weekly news update" || echo "No changes to commit"
          git push
